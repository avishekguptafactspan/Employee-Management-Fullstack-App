name: Notify GitOps Agent on CI Completion

on:
  workflow_run:
    workflows:
      - "CI/CD Pipeline for Employee Management"
    types:
      - completed

jobs:
  notify-agent:
    name: 📡 Notify GitOps Webhook Agent
    runs-on: ubuntu-latest
    steps:
      - name: Send workflow_run event to GitOps Agent
        env:
          WEBHOOK_URL: ${{ secrets.GITOPS_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.GITOPS_WEBHOOK_SECRET }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          echo "CI Pipeline conclusion: $CONCLUSION"
          echo "Run ID: $RUN_ID"

          # Build the pull_requests array from workflow_run context
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"

          PAYLOAD=$(jq -n \
            --arg conclusion "$CONCLUSION" \
            --argjson run_id "$RUN_ID" \
            --arg run_name "$RUN_NAME" \
            --arg head_sha "$HEAD_SHA" \
            --arg repo "$REPO_FULL_NAME" \
            '{
              workflow_run: {
                conclusion: $conclusion,
                id: $run_id,
                name: $run_name,
                head_sha: $head_sha,
                pull_requests: []
              },
              repository: {
                full_name: $repo
              }
            }')

          # If a PR number is available, embed it
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            PAYLOAD=$(echo "$PAYLOAD" | jq \
              --argjson pr_num "$PR_NUMBER" \
              '.workflow_run.pull_requests = [{"number": $pr_num}]')
          fi

          echo "Sending payload to webhook..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: workflow_run" \
            -H "X-Hub-Signature-256: sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/SHA2-256(stdin)= //')" \
            -d "$PAYLOAD")

          echo "Webhook response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ GitOps Agent notified successfully."
          else
            echo "⚠️ Webhook returned status $HTTP_STATUS — check agent logs."
            exit 1
          fi
